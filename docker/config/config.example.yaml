# =============================================================================
# dns-sync config.example.yaml
# =============================================================================
# Copy this file to config.yaml and edit for your environment.
#
# Credentials are loaded exclusively from env vars:
#   DNS_SYNC_{SERVER_NAME}_{FIELD}  (hyphens → underscores, uppercased)
#   e.g. DNS_SYNC_PIHOLE_MAIN_PASSWORD
# The "encrypted:field" marker in auth blocks is just a field-name hint — no
# encryption or master.key required. Set the real value in your .env file.
#
# =============================================================================
# FORMAT A — Multi-hub (recommended for new setups)
# =============================================================================
# Detected automatically when a top-level 'hubs:' key is present.
# Each spoke references its hub by name via the 'hub:' field.
#
# hubs:
#   - name: pihole-hub
#     type: pihole
#     enabled: true
#     url: http://192.168.1.10
#     auth:
#       password: encrypted:password
#
#   - name: adguard-hub
#     type: adguard
#     enabled: true
#     url: http://192.168.1.20:3000
#     auth:
#       username: encrypted:username
#       password: encrypted:password
#
# servers:
#   - name: pihole-spoke
#     type: pihole
#     hub: pihole-hub          # ← which hub this spoke belongs to
#     enabled: true
#     url: http://192.168.1.11
#     auth:
#       password: encrypted:password
#
#   - name: adguard-spoke
#     type: adguard
#     hub: adguard-hub
#     enabled: true
#     url: http://192.168.1.21:3000
#     auth:
#       username: encrypted:username
#       password: encrypted:password
#
# =============================================================================
# FORMAT B — Single-hub legacy (backward compatible)
# =============================================================================
# Use sync_mode: hub for the source of truth, sync_mode: spoke for the rest.

servers:

  # ── Pi-hole ──────────────────────────────────────────────────────────────
  # Requires Pi-hole v6+. Default port: 80.
  - name: pihole-hub
    type: pihole
    sync_mode: hub
    enabled: true
    url: http://192.168.1.10:80
    auth:
      password: encrypted:password

  - name: pihole-spoke
    type: pihole
    sync_mode: spoke
    enabled: true
    url: http://192.168.1.11:80
    auth:
      password: encrypted:password

  # ── AdGuard Home ─────────────────────────────────────────────────────────
  # Default port: 3000 (setup), 80 after initial setup.
  - name: adguard-home
    type: adguard
    sync_mode: spoke
    enabled: true
    url: http://192.168.1.20:3000
    auth:
      username: encrypted:username
      password: encrypted:password

  # ── Cloudflare ───────────────────────────────────────────────────────────
  # api_token: scoped token with Zone:DNS:Edit permission
  # zone_id: found on the zone's Overview page in the Cloudflare dashboard
  - name: cloudflare
    type: cloudflare
    sync_mode: spoke
    enabled: true
    url: https://api.cloudflare.com
    auth:
      api_token: encrypted:api_token
      zone_id: encrypted:zone_id

  # ── OPNsense / pfSense ───────────────────────────────────────────────────
  # Create an API key in OPNsense: System → Access → Users → your user → API keys
  - name: opnsense
    type: opnsense
    sync_mode: spoke
    enabled: true
    url: https://192.168.1.1
    auth:
      api_key: encrypted:api_key
      api_secret: encrypted:api_secret

  # ── Technitium DNS ───────────────────────────────────────────────────────
  # Generate a token in Technitium: Administration → API Tokens
  # Default port: 5380
  # NOTE: Technitium's API passes the token as a URL query parameter (?token=...).
  # The token will appear in Technitium's own access logs and any reverse proxy logs.
  - name: technitium-home
    type: technitium
    sync_mode: spoke
    enabled: true
    url: http://192.168.1.30:5380
    auth:
      api_token: encrypted:api_token

  # ── Unbound ──────────────────────────────────────────────────────────────
  # api_key is optional depending on your Unbound HTTP control setup
  - name: unbound
    type: unbound
    sync_mode: spoke
    enabled: true
    url: http://192.168.1.40:8953
    auth:
      api_key: encrypted:api_key   # omit auth block entirely if no key required

